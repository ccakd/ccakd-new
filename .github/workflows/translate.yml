name: Auto-Translate Content

on:
  push:
    branches: [main]
    paths:
      - 'content/announcements/**'
      - 'content/programs/**'
      - 'content/about/**'
      - 'content/about.yaml'
      - 'content/homepage/**'
      - 'content/homepage.yaml'
      - 'content/terms/**'
      - 'content/terms.yaml'

  workflow_dispatch:
    inputs:
      path:
        description: 'Specific content path to translate (e.g., content/announcements/my-post.yaml)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Find changed content files
        id: changes
        env:
          INPUT_PATH: ${{ inputs.path }}
        run: |
          if [ -n "$INPUT_PATH" ]; then
            echo "$INPUT_PATH" > /tmp/changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD -- 'content/**' > /tmp/changed_files.txt
          fi

          cat /tmp/changed_files.txt
          echo "count=$(wc -l < /tmp/changed_files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Translate content
        if: steps.changes.outputs.count != '0'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_AI_API_KEY }}
        run: |
          # Map of language suffixes to full names for prompts
          declare -A LANG_NAMES=(
            ["en"]="English"
            ["zh"]="Simplified Chinese"
            ["zhtw"]="Traditional Chinese"
          )

          translate_text() {
            local text="$1"
            local source_lang="$2"
            local target_lang="$3"
            local is_markdoc="$4"

            local source_name="${LANG_NAMES[$source_lang]}"
            local target_name="${LANG_NAMES[$target_lang]}"

            local format_instruction=""
            if [ "$is_markdoc" = "true" ]; then
              format_instruction="The text is in Markdoc format. Preserve ALL Markdoc tags, image references (![alt](url)), link URLs, HTML elements, and formatting exactly as-is. Only translate the human-readable text content. Do not translate URLs, file paths, or tag names."
            fi

            local prompt="Translate the following ${source_name} text to ${target_name}. ${format_instruction} Return ONLY the translated text, no explanations or wrapping."

            local response
            response=$(curl -s -X POST \
              "${AZURE_OPENAI_ENDPOINT}/openai/deployments/gpt-5.4/chat/completions?api-version=2025-01-01-preview" \
              -H "Content-Type: application/json" \
              -H "api-key: ${AZURE_OPENAI_API_KEY}" \
              -d "$(jq -n \
                --arg prompt "$prompt" \
                --arg text "$text" \
                '{messages: [{role: "system", content: $prompt}, {role: "user", content: $text}], max_completion_tokens: 4096}')")

            # Log errors from the API response
            local error
            error=$(echo "$response" | jq -r '.error.message // empty' 2>/dev/null)
            if [ -n "$error" ]; then
              echo "  ⚠ API error: $error" >&2
              return 1
            fi

            echo "$response" | jq -r '.choices[0].message.content // empty'
          }

          # Group changes by content entry
          ENTRIES=()
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [[ "$file" == *.yaml ]]; then
              entry="${file%.yaml}"
            else
              entry=$(dirname "$file")
            fi
            if [[ ! " ${ENTRIES[*]} " =~ " ${entry} " ]]; then
              ENTRIES+=("$entry")
            fi
          done < /tmp/changed_files.txt

          for entry in "${ENTRIES[@]}"; do
            echo "=== Processing: $entry ==="
            yaml_file="${entry}.yaml"

            if [ ! -f "$yaml_file" ]; then
              echo "  No YAML file found at $yaml_file, skipping"
              continue
            fi

            # --- Translate YAML text fields ---
            # Find all trilingual field groups by looking for _en suffix
            EN_FIELDS=$(yq 'keys | .[]' "$yaml_file" 2>/dev/null | grep '_en$' || true)

            for en_field in $EN_FIELDS; do
              base="${en_field%_en}"
              zh_field="${base}_zh"
              zhtw_field="${base}_zhtw"

              en_val=$(yq ".${en_field} // \"\"" "$yaml_file" 2>/dev/null)
              zh_val=$(yq ".${zh_field} // \"\"" "$yaml_file" 2>/dev/null)
              zhtw_val=$(yq ".${zhtw_field} // \"\"" "$yaml_file" 2>/dev/null)

              # Helper to check if a value is empty
              is_empty() { [ -z "$1" ] || [ "$1" = "null" ] || [ "$1" = "''" ]; }

              # Determine the source language (first non-empty field)
              source_lang=""
              source_val=""
              if ! is_empty "$en_val"; then
                source_lang="en"; source_val="$en_val"
              elif ! is_empty "$zh_val"; then
                source_lang="zh"; source_val="$zh_val"
              elif ! is_empty "$zhtw_val"; then
                source_lang="zhtw"; source_val="$zhtw_val"
              else
                continue  # All empty, skip
              fi

              # Translate to each empty target
              for target_lang in en zh zhtw; do
                [ "$target_lang" = "$source_lang" ] && continue
                target_field="${base}_${target_lang}"
                target_val=$(yq ".${target_field} // \"\"" "$yaml_file" 2>/dev/null)

                if is_empty "$target_val"; then
                  echo "  Translating ${base}_${source_lang} → $target_field"
                  translated=$(translate_text "$source_val" "$source_lang" "$target_lang" "false")
                  if [ -n "$translated" ]; then
                    yq -i ".${target_field} = $(echo "$translated" | jq -Rs '.')" "$yaml_file"
                    echo "    ✓ $target_field translated"
                  else
                    echo "    ✗ $target_field translation returned empty"
                  fi
                fi
              done
            done

            # --- Translate .mdoc document fields ---
            if [ -d "$entry" ]; then
              # Collect unique base names from all mdoc files (not just _en)
              MDOC_BASES=()
              for mdoc_file in "$entry"/*_en.mdoc "$entry"/*_zh.mdoc "$entry"/*_zhtw.mdoc; do
                [ -f "$mdoc_file" ] || continue
                base_name=$(basename "$mdoc_file" | sed -E 's/_(en|zh|zhtw)\.mdoc$//')
                if [[ ! " ${MDOC_BASES[*]} " =~ " ${base_name} " ]]; then
                  MDOC_BASES+=("$base_name")
                fi
              done

              for base_name in "${MDOC_BASES[@]}"; do
                # Find the source language (first non-empty mdoc)
                source_lang=""
                source_content=""
                for lang in en zh zhtw; do
                  mdoc_path="${entry}/${base_name}_${lang}.mdoc"
                  if [ -f "$mdoc_path" ] && [ -s "$mdoc_path" ]; then
                    source_lang="$lang"
                    source_content=$(cat "$mdoc_path")
                    break
                  fi
                done

                [ -z "$source_lang" ] && continue  # All empty, skip

                # Translate to each missing target
                for target_lang in en zh zhtw; do
                  [ "$target_lang" = "$source_lang" ] && continue
                  target_mdoc="${entry}/${base_name}_${target_lang}.mdoc"

                  if [ ! -f "$target_mdoc" ] || [ ! -s "$target_mdoc" ]; then
                    echo "  Translating ${base_name}_${source_lang}.mdoc → ${base_name}_${target_lang}.mdoc"
                    translated=$(translate_text "$source_content" "$source_lang" "$target_lang" "true")
                    if [ -n "$translated" ]; then
                      echo "$translated" > "$target_mdoc"
                      echo "    ✓ ${base_name}_${target_lang}.mdoc translated"
                    else
                      echo "    ✗ ${base_name}_${target_lang}.mdoc translation returned empty"
                    fi
                  fi
                done
              done
            fi

            echo "  Done: $entry"
          done

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/

          if git diff --cached --quiet; then
            echo "::notice::No translations needed"
          else
            git commit -m "chore: auto-translate content"
            git push
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Translation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Processed $(wc -l < /tmp/changed_files.txt | tr -d ' ') changed files" >> "$GITHUB_STEP_SUMMARY"

  # Deploy the site after translation (with or without new translations)
  deploy:
    needs: translate
    if: needs.translate.result == 'success'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
